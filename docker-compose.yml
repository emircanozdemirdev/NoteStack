services:
  postgres:
    image: postgres:16-alpine
    container_name: smartnotes-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: smartnotes
      POSTGRES_PASSWORD: smartnotes
      POSTGRES_DB: smartnotes_dev
    volumes:
      - smartnotes_pgdata:/var/lib/postgresql/data

volumes:
  smartnotes_pgdata:
