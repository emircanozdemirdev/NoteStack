name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartnotes
          POSTGRES_PASSWORD: smartnotes
          POSTGRES_DB: smartnotes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U smartnotes -d smartnotes_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://smartnotes:smartnotes@localhost:5432/smartnotes_test?schema=public
      JWT_SECRET: ci_jwt_secret_change_me
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_change_me
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma migrate (API)
        run: pnpm --filter @smartnotes/api exec prisma migrate deploy

      - name: Build
        run: pnpm run build

      - name: Test (API unit)
        run: pnpm --filter @smartnotes/api run test -- --passWithNoTests

      - name: Test (API e2e)
        run: pnpm --filter @smartnotes/api run test:e2e
